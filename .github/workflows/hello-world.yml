name: Hello World

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '10 12 * * *'

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print Hello World
        run: echo "Hello World!"
        
      - name: Trigger downstream workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/hello-input.yml/dispatches \
            -d '{
              "ref":"main",
              "inputs":{
                "InputParameter":"trigger from upstream"
              }
            }'